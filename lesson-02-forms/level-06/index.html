<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Lesson 02 — Level 06</title>
  </head>
  <body>
    <h1>Level 06 — Radios & Checkboxes</h1>
    <form>
      <!-- TODO: Add radio inputs that share a name attribute -->
      <fieldset>
        <legend>Choose a Plan</legend>
        <input type="radio" name="Plan" value="basic" />
        <label>Basic</label>

        <input type="radio" name="Pro" value="pro" />
        <label>Pro</label>
      </fieldset>
      <!-- TODO: Add one or more checkbox inputs -->
      <label>
        <input type="checkbox" name="subscribe" /> Subscribe to Newsletter
      </label>
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
